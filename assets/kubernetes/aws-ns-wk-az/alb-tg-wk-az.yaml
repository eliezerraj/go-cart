apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: tg-go-cart-ns-wk-az
  namespace: wk-az
  labels:
    app: tg-go-cart-ns-wk-az
spec:
  targetReference:
    name: svc-go-cart
  defaultConfiguration:
    targetGroupName: tg-go-cart-ns-wk-az
    targetType: ip
  routeConfigurations:
    - routeIdentifier:
        kind: HTTPRoute
        name: go-cart-wk-az-route
        namespace: wk-az
      targetGroupProps:
        healthCheckConfig:
          healthCheckProtocol: HTTP
          healthCheckPath: /health
          healthCheckPort: traffic-port 
          healthyThresholdCount: 2 
          unhealthyThresholdCount: 2